name: esy
description: "EASY WORK AI - منصة ذكية للتوظيف في أوروبا"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Network & HTTP
  http: ^1.2.0

  # Firebase
  firebase_core: ^3.8.1
  cloud_firestore: ^5.6.0
  cloud_functions: ^5.2.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  firebase_auth: ^5.4.0
  flutter_local_notifications: ^18.0.1

  # Google Services
  google_mobile_ads: ^4.0.0
  google_fonts: ^6.1.0

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # Encryption
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0
  pointycastle: ^3.7.4

  # UI Utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  url_launcher: ^6.2.5
  intl: ^0.19.0

  # Image Picker
  image_picker: ^1.0.7
  image: ^4.1.7

  # State Management
  provider: ^6.1.2

  # Environment
  flutter_dotenv: ^5.1.0

  # Utils
  path_provider: ^2.1.2
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env